<section class="product-list" *ngIf="products?.length; else emptyState">
  <article class="product-card" *ngFor="let product of products; let i = index">
    <img
      *ngIf="product.image"
      [src]="product.image"
      [alt]="product.name"
      class="product-image"
    />

    <div class="product-body">
      <div class="product-heading">
        <div>
          <h2>{{ product.name }}</h2>
          <span class="product-id">ID: {{ product.id }}</span>
        </div>
        <span class="product-price">{{ product.price | currency:'USD':'symbol':'1.0-0' }}</span>
      </div>

      <div class="product-meta">
        <span>Category: {{ product.categoryId }}</span>
        <span>Spiciness: {{ product.spiciness }}</span>
      </div>

      <ul class="product-attributes">
        <li [class.available]="product.vegetarian">Vegetarian</li>
        <li [class.available]="!product.nuts">Nut free</li>
      </ul>
    </div>
  </article>
</section>

<ng-template #emptyState>
  <div class="empty-state">
    ჯერ არ არის პროდუქტი.
  </div>
</ng-template>
